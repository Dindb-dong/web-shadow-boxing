name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (include optional)
        run: npm ci --include=optional

      - name: Ensure Rollup native binary on Linux x64
        run: npm run ensure:rollup-native

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
