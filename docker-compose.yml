services:
  app:
    build: .
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

  test:
    build: .
    command: sh -c "npm install && npm run test:run"
    volumes:
      - .:/app
      - /app/node_modules
