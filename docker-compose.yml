services:
  app:
    build: .
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  test:
    build: .
    command: npm run test:run
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules: